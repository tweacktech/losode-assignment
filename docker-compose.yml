version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: losode_api
    restart: unless-stopped
    working_dir: /app
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=losode_vendor
      - DB_USERNAME=losode_user
      - DB_PASSWORD=secret
    volumes:
      - .:/app
    networks:
      - losode

  db:
    image: mysql:8.0
    container_name: losode_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: losode_vendor
      MYSQL_USER: losode_user
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root_secret
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - losode

  nginx:
    image: nginx:alpine
    container_name: losode_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/app
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - losode

volumes:
  db_data:
    driver: local

networks:
  losode:
    driver: bridge
